{{define "home.html"}}
{{template "base" .}}
{{define "content"}}
<h2 class="text-xl mb-4">Find Grants matching your NGO's Mission</h2>
<form hx-post="/match" hx-target="#results" hx-indicator="#spinner" class="space-y-4">
  <div>
      <label class="block mb-1">NGO Name</label>
      <input name="ngo_name" class="w-full border p-2 rounded" placeholder="Your NGO name" required />
  </div>
  <div>
      <label class="block mb-1">Mission</label>
      <textarea name="mission" class="w-full border p-2 rounded h-24" placeholder="Describe your mission (2-3 sentences)" required></textarea>
  </div>
  <div class="grid grid-cols-2 gap-4">
      <div>
          <label class="block mb-1">Region</label>
          <select name="region" class="w-full border p-2 rounded">
            <option value="global">Global</option>
            <option value="europe">Europe</option>
            <option value="africa">Africa</option>
            <option value="asia">Asia</option>
            <option value="americas">Americas</option>
          </select>
      </div>
      <div>
          <label class="block mb-1">Budget Needed (USD)</label>
          <input name="budget" type="number" class="w-full border p-2 rounded" placeholder="e.g. 50000" />
      </div>
  </div>
  <div>
      <label class="block mb-1">Categories</label>
      <input name="categories" class="w-full border p-2 rounded" placeholder="e.g. health, education, climate" />
  </div>
  
  <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Find Matching Grants</button>
</form>

<div id="spinner" class="htmx-indicator mt-4 text-indigo-600 font-bold">Searching and ranking grants...</div>
<div id="results" class="mt-8 space-y-6"></div>
{{end}}
{{end}}
